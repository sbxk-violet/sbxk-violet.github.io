<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 </title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      user-select: none;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a2a32 0%, #0f1a1f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
    }
    .game-wrapper {
      background: #1e2f3a;
      padding: 2rem 2.5rem 2.5rem 2.5rem;
      border-radius: 4rem 4rem 3rem 3rem;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }
    .game-panel {
      background: #0d1b20;
      padding: 1.8rem 2rem 2rem 2rem;
      border-radius: 2.8rem;
      box-shadow: inset 0 -6px 0 #2b414b, inset 0 6px 8px rgba(0,0,0,0.6);
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: #1d2f38;
      border-radius: 2.2rem;
      box-shadow: inset 0 0 0 2px #2b414d, 0 12px 24px rgba(0,0,0,0.6);
      width: 500px;
      height: 500px;
      image-rendering: crisp-edges; /* 像素风格 */
    }
    .info-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.4rem;
      padding: 0 0.3rem;
      color: #b3d6e6;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 3px rgba(0,0,0,0.5);
    }
    .score-box {
      background: #0a171e;
      padding: 0.5rem 1.6rem;
      border-radius: 3rem;
      font-size: 1.7rem;
      font-weight: 700;
      color: #b7e4b0;
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.7), 0 0 0 1px #3a5b66;
      backdrop-filter: blur(2px);
    }
    .controls {
      display: flex;
      gap: 1.2rem;
      align-items: center;
    }
    button {
      background: #2d4652;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 0.5rem 1.8rem;
      border-radius: 3rem;
      cursor: pointer;
      box-shadow: 0 6px 0 #15222a, 0 4px 8px rgba(0,0,0,0.5);
      transition: 0.07s ease;
      letter-spacing: 0.5px;
      border: 1px solid #4d6f7e;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #15222a;
    }
    button:focus-visible {
      outline: 2px solid #96d9b0;
      outline-offset: 3px;
    }
    .hint {
      font-size: 0.9rem;
      opacity: 0.8;
      background: #1a2f38;
      padding: 0.3rem 1.4rem;
      border-radius: 2rem;
      border-left: 2px solid #5f8b9b;
    }
    .status-led {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .led {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #3b7a4a;
      box-shadow: 0 0 8px #54b87a;
      transition: 0.2s;
    }
    .led.paused {
      background: #b88a3b;
      box-shadow: 0 0 8px #eab957;
    }
    .led.gameover {
      background: #b14141;
      box-shadow: 0 0 10px #e06060;
    }
    @media (max-width: 600px) {
      .game-wrapper { padding: 1rem; }
      canvas { width: 90vw; height: 90vw; max-width: 500px; max-height: 500px; }
      .info-bar { flex-wrap: wrap; gap: 10px; justify-content: center; }
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="game-panel">
    <!-- Canvas 尺寸 500x500，内部网格 20x20，每个格子 25px -->
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    <div class="info-bar">
      <div class="score-box">🍎 <span id="scoreDisplay">0</span></div>
      <div class="controls">
        <div class="status-led">
          <span class="led" id="statusLed"></span>
          <span id="statusText" style="min-width: 60px;">运行中</span>
        </div>
        <button id="restartBtn">⟳ 重来</button>
      </div>
    </div>
    <div style="display: flex; justify-content: center; margin-top: 8px;">
      <span class="hint">W S A D  /  Space 暂停</span>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- 配置 ----------
    const BOARD_SIZE = 20;            // 20x20 网格
    const CELL_SIZE = 500 / BOARD_SIZE; // 25px

    // DOM 元素
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');

    // ---------- 游戏状态 ----------
    let snake = [];          // 坐标数组 [x,y]
    let food = { x: 8, y: 10 };
    let direction = 'right'; // 当前移动方向
    let nextDirection = 'right';
    let score = 0;
    let gameOver = false;
    let winFlag = false;     // 是否胜利 (蛇满)
    let paused = false;

    // 定时器相关
    let gameInterval = null;
    const MOVE_INTERVAL_MS = 160;  // 毫秒

    // 防止在同一个 tick 内多次改变方向
    let directionChangedThisTick = false;

    // ---------- 初始化 / 重置 ----------
    function initGame() {
      // 蛇: 初始长度为 3，水平放置
      snake = [
        [10, 10],
        [9, 10],
        [8, 10]
      ];
      direction = 'right';
      nextDirection = 'right';
      score = 0;
      gameOver = false;
      winFlag = false;
      paused = false;
      directionChangedThisTick = false;
      updateScore();
      generateFood();  // 确保食物不生成在蛇身上
      clearGameInterval();
      startGameLoop();
      updateStatusLed();
      statusText.innerText = '运行中';
    }

    // ---------- 食物生成 (避开蛇) ----------
    function generateFood() {
      const totalCells = BOARD_SIZE * BOARD_SIZE;
      if (snake.length >= totalCells) {
        // 胜利：蛇已占满所有格子
        winFlag = true;
        gameOver = true;
        clearGameInterval();
        statusText.innerText = '🎉 你赢了 !';
        updateStatusLed();
        return;
      }

      // 收集所有空闲格子
      const snakeSet = new Set(snake.map(cell => `${cell[0]},${cell[1]}`));
      if (snakeSet.size >= totalCells) {
        winFlag = true;
        gameOver = true;
        clearGameInterval();
        statusText.innerText = '🎉 完美!';
        updateStatusLed();
        return;
      }

      let freeCells = [];
      for (let i = 0; i < BOARD_SIZE; i++) {
        for (let j = 0; j < BOARD_SIZE; j++) {
          if (!snakeSet.has(`${i},${j}`)) {
            freeCells.push([i, j]);
          }
        }
      }

      if (freeCells.length === 0) {
        winFlag = true;
        gameOver = true;
        clearGameInterval();
        statusText.innerText = '✨ 胜利!';
        updateStatusLed();
        return;
      }

      const randomIndex = Math.floor(Math.random() * freeCells.length);
      const [fx, fy] = freeCells[randomIndex];
      food = { x: fx, y: fy };
    }

    // ---------- 蛇移动逻辑 ----------
    function moveSnake() {
      if (gameOver || paused) return false;

      // 应用有效方向
      const opposite = {
        'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left'
      };
      if (nextDirection && opposite[nextDirection] !== direction) {
        direction = nextDirection;
      }
      directionChangedThisTick = false;

      // 计算新头部
      const head = snake[0];
      let newHeadX = head[0];
      let newHeadY = head[1];
      switch (direction) {
        case 'right': newHeadX++; break;
        case 'left':  newHeadX--; break;
        case 'up':    newHeadY--; break;
        case 'down':  newHeadY++; break;
        default: return false;
      }

      // 检查是否吃到食物
      const isEating = (newHeadX === food.x && newHeadY === food.y);

      // 构建新蛇 (先复制)
      let newSnake = [];
      newSnake.push([newHeadX, newHeadY]); // 新头部

      // 如果吃到食物，保留原蛇所有身体 (不删除尾部)
      if (isEating) {
        // 保留原蛇全部 + 新头部 (上面已经push了新头)
        // 但注意原蛇头部已经被新头替换，所以要把原蛇的头部之后的身体加上
        // 更稳健: 从原蛇复制全部身体 (包括旧头部) 但新头部已经添加，所以要去掉原头部避免重复
        // 正确做法: 从原蛇索引0开始加入 (但新头部已经用了新坐标)
        // 我们直接将原蛇所有身体加入 (除了原头部，因为新头部已经替代)
        for (let i = 0; i < snake.length; i++) {
          newSnake.push(snake[i]);
        }
        // 但 newSnake 现在有 [新头, 旧头, 旧身...] 旧头重复了, 删除旧头 (索引1)
        // 更清晰: 用 slice
        // 重置 newSnake: [新头, ...原蛇]
        newSnake = [[newHeadX, newHeadY], ...snake];
      } else {
        // 没吃到: 新蛇 = [新头, ...原蛇除尾部]
        newSnake = [[newHeadX, newHeadY], ...snake.slice(0, -1)];
      }

      // 碰撞检测 (边界 & 自身)
      // 边界
      if (newHeadX < 0 || newHeadX >= BOARD_SIZE || newHeadY < 0 || newHeadY >= BOARD_SIZE) {
        gameOver = true;
        clearGameInterval();
        statusText.innerText = '💀 撞墙';
        updateStatusLed();
        return false;
      }

      // 自身碰撞 (新头部不能与除尾部外 (且尾部已去除) 的其余部分重叠)
      // 但注意如果吃到食物，尾部没有去除，需要检查新头部是否与除了新头部自身以外的蛇身重叠
      // 用新蛇检查: 从索引1开始检查是否与新头部相同
      for (let i = 1; i < newSnake.length; i++) {
        if (newSnake[i][0] === newHeadX && newSnake[i][1] === newHeadY) {
          gameOver = true;
          clearGameInterval();
          statusText.innerText = '💥 咬到自己';
          updateStatusLed();
          return false;
        }
      }

      // 更新蛇
      snake = newSnake;

      // 处理食物
      if (isEating) {
        score++;
        updateScore();
        generateFood(); // 可能触发胜利 (gameOver = true)
        if (gameOver) {
          // 如果胜利, generateFood 内部设置了 gameOver = true 并清理定时器
          statusText.innerText = winFlag ? '🎉 胜利!' : '💀 游戏结束';
          updateStatusLed();
          return false;
        }
      }

      return true;
    }

    // ---------- 渲染 ----------
    function draw() {
      ctx.clearRect(0, 0, 500, 500);

      // 绘制网格线 (细线装饰)
      ctx.strokeStyle = '#2d4a55';
      ctx.lineWidth = 0.6;
      for (let i = 0; i <= BOARD_SIZE; i++) {
        const pos = i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, 500);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(500, pos);
        ctx.stroke();
      }

      // 绘制食物
      ctx.shadowColor = '#f5d742';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#f54242';
      ctx.beginPath();
      const fx = food.x * CELL_SIZE + CELL_SIZE/2;
      const fy = food.y * CELL_SIZE + CELL_SIZE/2;
      ctx.arc(fx, fy, CELL_SIZE/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      // 高光
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff8a8a';
      ctx.beginPath();
      ctx.arc(fx-3, fy-3, 4, 0, Math.PI*2);
      ctx.fill();

      // 绘制蛇
      ctx.shadowBlur = 8;
      ctx.shadowColor = '#3ba36b';
      snake.forEach((segment, index) => {
        const [x, y] = segment;
        const isHead = (index === 0);
        const cx = x * CELL_SIZE + CELL_SIZE/2;
        const cy = y * CELL_SIZE + CELL_SIZE/2;
        const radius = CELL_SIZE/2 - 2.5;

        // 身体渐变
        const gradient = ctx.createRadialGradient(cx-4, cy-4, 2, cx, cy, radius+2);
        if (isHead) {
          gradient.addColorStop(0, '#8cdb9e');
          gradient.addColorStop(0.7, '#46b86a');
          gradient.addColorStop(1, '#1f7a44');
        } else {
          gradient.addColorStop(0, '#6fc98a');
          gradient.addColorStop(0.5, '#3b9e5e');
          gradient.addColorStop(1, '#1b6a3a');
        }
        ctx.fillStyle = gradient;

        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();

        // 眼睛 (头部)
        if (isHead) {
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#f0faf5';
          ctx.beginPath();
          let eyeOff = 6;
          let eyeX1, eyeY1, eyeX2, eyeY2;
          switch (direction) {
            case 'right': eyeX1 = cx+5; eyeY1 = cy-6; eyeX2 = cx+5; eyeY2 = cy+6; break;
            case 'left':  eyeX1 = cx-5; eyeY1 = cy-6; eyeX2 = cx-5; eyeY2 = cy+6; break;
            case 'up':    eyeX1 = cx-6; eyeY1 = cy-5; eyeX2 = cx+6; eyeY2 = cy-5; break;
            case 'down':  eyeX1 = cx-6; eyeY1 = cy+5; eyeX2 = cx+6; eyeY2 = cy+5; break;
            default: eyeX1 = cx+5; eyeY1 = cy-6; eyeX2 = cx+5; eyeY2 = cy+6;
          }
          ctx.arc(eyeX1, eyeY1, 3.5, 0, Math.PI*2);
          ctx.fill();
          ctx.arc(eyeX2, eyeY2, 3.5, 0, Math.PI*2);
          ctx.fill();
          ctx.fillStyle = '#0f2a1c';
          ctx.beginPath();
          ctx.arc(eyeX1+1.5, eyeY1-1, 1.8, 0, Math.PI*2);
          ctx.fill();
          ctx.arc(eyeX2+1.5, eyeY2-1, 1.8, 0, Math.PI*2);
          ctx.fill();
        }
      });
      ctx.shadowBlur = 0;

      // 如果游戏结束, 蒙层
      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 0, 500, 500);
        ctx.fillStyle = '#f5e6d3';
        ctx.font = 'bold 32px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(winFlag ? '✨ 胜利 ✨' : '☠️ 游戏结束', 250, 240);
      } else if (paused) {
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.fillRect(0, 0, 500, 500);
        ctx.fillStyle = '#d4d9b0';
        ctx.font = 'bold 36px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('⏸ 暂停', 250, 240);
      }
    }

    // ---------- 辅助函数 ----------
    function updateScore() {
      scoreSpan.textContent = score;
    }

    function updateStatusLed() {
      statusLed.className = 'led';
      if (gameOver) {
        statusLed.classList.add('gameover');
      } else if (paused) {
        statusLed.classList.add('paused');
      }
    }

    // ---------- 定时器控制 ----------
    function startGameLoop() {
      if (gameInterval) clearInterval(gameInterval);
      gameInterval = setInterval(() => {
        if (!paused && !gameOver) {
          moveSnake();
          draw();
          updateStatusLed();
          // 若 gameOver 在 move 中被置为 true, 状态更新
          if (gameOver) {
            updateStatusLed();
            statusText.innerText = winFlag ? '🎉 胜利' : '💀 游戏结束';
          }
        }
        draw(); // 即使暂停也刷新 (显示暂停图层)
      }, MOVE_INTERVAL_MS);
    }

    function clearGameInterval() {
      if (gameInterval) {
        clearInterval(gameInterval);
        gameInterval = null;
      }
    }

    // ---------- 键盘控制 ----------
    function handleKeydown(e) {
      const key = e.key;
      // 阻止箭头滚动 & 空格点击
      if (key.startsWith('Arrow') || key === ' ' || key === 'Spacebar') {
        e.preventDefault();
      }

      // 空格: 暂停/继续
      if (key === ' ' || key === 'Spacebar' || key === 'Space') {
        if (!gameOver) {
          paused = !paused;
          updateStatusLed();
          statusText.innerText = paused ? '⏸ 暂停' : '运行中';
          draw(); // 立即刷新暂停图层
        }
        return;
      }

      // 方向 (只在游戏未结束且未暂停时)
      if (gameOver || paused) return;

      let newDir = null;
     if (key === 'w' || key === 'W') newDir = 'up';
      else if (key === 's' || key === 'S') newDir = 'down';
      else if (key === 'a' || key === 'A') newDir = 'left';
      else if (key === 'd' || key === 'D') newDir = 'right';
      else return;

      // 禁止掉头
      const opposite = {
        'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left'
      };
      if (direction !== opposite[newDir]) {
        nextDirection = newDir;
        directionChangedThisTick = true;
      }
    }

    // ---------- 重启 ----------
    function restartGame() {
      clearGameInterval();
      initGame();
      draw();
      updateStatusLed();
      statusText.innerText = '运行中';
    }

    // ---------- 挂载 & 启动 ----------
    window.addEventListener('keydown', handleKeydown);

    document.getElementById('restartBtn').addEventListener('click', restartGame);

    // 启动游戏
    initGame();
    draw();

    // 窗口失焦时防止键盘卡键 (可选)
    window.addEventListener('blur', () => { /* 不做强制处理 */ });
  })();
</script>
</body>
</html>
