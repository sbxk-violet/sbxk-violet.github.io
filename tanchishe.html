<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 · 开始键</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            user-select: none;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a32 0%, #0f1a1f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 16px;
        }
        .game-wrapper {
            background: #1e2f3a;
            padding: 2rem 2.5rem 2.5rem 2.5rem;
            border-radius: 4rem 4rem 3rem 3rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.7), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        }
        .game-panel {
            background: #0d1b20;
            padding: 1.8rem 2rem 2rem 2rem;
            border-radius: 2.8rem;
            box-shadow: inset 0 -6px 0 #2b414b, inset 0 6px 8px rgba(0,0,0,0.6);
            position: relative;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #1d2f38;
            border-radius: 2.2rem;
            box-shadow: inset 0 0 0 2px #2b414d, 0 12px 24px rgba(0,0,0,0.6);
            width: 500px;
            height: 500px;
            image-rendering: crisp-edges;
            position: relative;
        }
        /* 开始按钮覆盖层 —— 位于canvas之上 */
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;  /* 默认让点击穿透，但按钮本身可点击 */
            border-radius: 2.2rem;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
            transition: opacity 0.3s ease;
        }
        #startOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #startBtn {
            pointer-events: auto;
            background: #3a8a5c;
            border: none;
            color: white;
            font-weight: 700;
            font-size: 2.2rem;
            padding: 0.8rem 3rem;
            border-radius: 5rem;
            cursor: pointer;
            box-shadow: 0 10px 0 #1a4a2e, 0 8px 24px rgba(0,0,0,0.6);
            transition: 0.08s ease;
            letter-spacing: 2px;
            border: 2px solid #7bc99a;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        #startBtn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #1a4a2e;
        }
        #startBtn:hover {
            background: #45a06a;
            border-color: #96e0b2;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.4rem;
            padding: 0 0.3rem;
            color: #b3d6e6;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 3px rgba(0,0,0,0.5);
        }
        .score-box {
            background: #0a171e;
            padding: 0.5rem 1.6rem;
            border-radius: 3rem;
            font-size: 1.7rem;
            font-weight: 700;
            color: #b7e4b0;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.7), 0 0 0 1px #3a5b66;
        }
        .controls {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }
        button {
            background: #2d4652;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.5rem 1.8rem;
            border-radius: 3rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #15222a, 0 4px 8px rgba(0,0,0,0.5);
            transition: 0.07s ease;
            border: 1px solid #4d6f7e;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #15222a;
        }
        .hint {
            font-size: 0.9rem;
            opacity: 0.8;
            background: #1a2f38;
            padding: 0.3rem 1.4rem;
            border-radius: 2rem;
            border-left: 2px solid #5f8b9b;
        }
        .status-led {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #3b7a4a;
            box-shadow: 0 0 8px #54b87a;
            transition: 0.2s;
        }
        .led.paused {
            background: #b88a3b;
            box-shadow: 0 0 8px #eab957;
        }
        .led.gameover {
            background: #b14141;
            box-shadow: 0 0 10px #e06060;
        }
        .led.idle {
            background: #6a7a82;
            box-shadow: 0 0 6px #8aa8b5;
        }
        @media (max-width: 600px) {
            .game-wrapper { padding: 1rem; }
            canvas { width: 90vw; height: 90vw; max-width: 500px; max-height: 500px; }
            .info-bar { flex-wrap: wrap; gap: 10px; justify-content: center; }
            #startBtn { font-size: 1.6rem; padding: 0.6rem 2rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-panel" style="position: relative;">
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        <!-- 开始按钮覆盖层 -->
        <div id="startOverlay">
            <button id="startBtn">▶ 开始游戏</button>
        </div>
        <div class="info-bar">
            <div class="score-box">🍎 <span id="scoreDisplay">0</span></div>
            <div class="controls">
                <div class="status-led">
                    <span class="led" id="statusLed"></span>
                    <span id="statusText" style="min-width: 60px;">等待开始</span>
                </div>
                <button id="restartBtn">⟳ 重来</button>
            </div>
        </div>
        <div style="display: flex; justify-content: center; margin-top: 8px;">
            <span class="hint">W S A D  /  Space 暂停</span>
        </div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const BOARD_SIZE = 20;
        const CELL_SIZE = 500 / BOARD_SIZE;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const statusLed = document.getElementById('statusLed');
        const statusText = document.getElementById('statusText');
        const startOverlay = document.getElementById('startOverlay');
        const startBtn = document.getElementById('startBtn');

        // ---------- 游戏状态 ----------
        let snake = [];
        let food = { x: 8, y: 10 };
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameOver = false;
        let winFlag = false;
        let paused = false;
        let gameInterval = null;
        const MOVE_INTERVAL_MS = 160;
        let directionChangedThisTick = false;
        let gameStarted = false;          // 新增：是否已点击开始

        // ---------- 初始化（仅重置数据，不自动开始） ----------
        function resetGameData() {
            snake = [
                [10, 10],
                [9, 10],
                [8, 10]
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            gameOver = false;
            winFlag = false;
            paused = false;
            directionChangedThisTick = false;
            gameStarted = false;          // 重置为未开始
            updateScore();
            generateFood();
            clearGameInterval();
            updateStatusLed();
            statusText.innerText = '等待开始';
            startOverlay.classList.remove('hidden');   // 显示开始按钮
            draw();
        }

        // ---------- 食物生成 ----------
        function generateFood() {
            const totalCells = BOARD_SIZE * BOARD_SIZE;
            if (snake.length >= totalCells) {
                winFlag = true;
                gameOver = true;
                clearGameInterval();
                statusText.innerText = '🎉 你赢了 !';
                updateStatusLed();
                return;
            }
            const snakeSet = new Set(snake.map(cell => `${cell[0]},${cell[1]}`));
            if (snakeSet.size >= totalCells) {
                winFlag = true;
                gameOver = true;
                clearGameInterval();
                statusText.innerText = '🎉 完美!';
                updateStatusLed();
                return;
            }
            let freeCells = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (!snakeSet.has(`${i},${j}`)) {
                        freeCells.push([i, j]);
                    }
                }
            }
            if (freeCells.length === 0) {
                winFlag = true;
                gameOver = true;
                clearGameInterval();
                statusText.innerText = '✨ 胜利!';
                updateStatusLed();
                return;
            }
            const randomIndex = Math.floor(Math.random() * freeCells.length);
            const [fx, fy] = freeCells[randomIndex];
            food = { x: fx, y: fy };
        }

        // ---------- 蛇移动 ----------
        function moveSnake() {
            if (gameOver || paused || !gameStarted) return false;

            const opposite = {
                'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left'
            };
            if (nextDirection && opposite[nextDirection] !== direction) {
                direction = nextDirection;
            }
            directionChangedThisTick = false;

            const head = snake[0];
            let newHeadX = head[0];
            let newHeadY = head[1];
            switch (direction) {
                case 'right': newHeadX++; break;
                case 'left':  newHeadX--; break;
                case 'up':    newHeadY--; break;
                case 'down':  newHeadY++; break;
                default: return false;
            }

            const isEating = (newHeadX === food.x && newHeadY === food.y);
            let newSnake = [];
            if (isEating) {
                newSnake = [[newHeadX, newHeadY], ...snake];
            } else {
                newSnake = [[newHeadX, newHeadY], ...snake.slice(0, -1)];
            }

            // 碰撞检测
            if (newHeadX < 0 || newHeadX >= BOARD_SIZE || newHeadY < 0 || newHeadY >= BOARD_SIZE) {
                gameOver = true;
                clearGameInterval();
                statusText.innerText = '💀 撞墙';
                updateStatusLed();
                return false;
            }
            for (let i = 1; i < newSnake.length; i++) {
                if (newSnake[i][0] === newHeadX && newSnake[i][1] === newHeadY) {
                    gameOver = true;
                    clearGameInterval();
                    statusText.innerText = '💥 咬到自己';
                    updateStatusLed();
                    return false;
                }
            }

            snake = newSnake;
            if (isEating) {
                score++;
                updateScore();
                generateFood();
                if (gameOver) {
                    statusText.innerText = winFlag ? '🎉 胜利!' : '💀 游戏结束';
                    updateStatusLed();
                    return false;
                }
            }
            return true;
        }

        // ---------- 渲染 ----------
        function draw() {
            ctx.clearRect(0, 0, 500, 500);
            // 网格
            ctx.strokeStyle = '#2d4a55';
            ctx.lineWidth = 0.6;
            for (let i = 0; i <= BOARD_SIZE; i++) {
                const pos = i * CELL_SIZE;
                ctx.beginPath();
                ctx.moveTo(pos, 0);
                ctx.lineTo(pos, 500);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, pos);
                ctx.lineTo(500, pos);
                ctx.stroke();
            }

            // 食物
            ctx.shadowColor = '#f5d742';
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#f54242';
            ctx.beginPath();
            const fx = food.x * CELL_SIZE + CELL_SIZE/2;
            const fy = food.y * CELL_SIZE + CELL_SIZE/2;
            ctx.arc(fx, fy, CELL_SIZE/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ff8a8a';
            ctx.beginPath();
            ctx.arc(fx-3, fy-3, 4, 0, Math.PI*2);
            ctx.fill();

            // 蛇
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#3ba36b';
            snake.forEach((segment, index) => {
                const [x, y] = segment;
                const isHead = (index === 0);
                const cx = x * CELL_SIZE + CELL_SIZE/2;
                const cy = y * CELL_SIZE + CELL_SIZE/2;
                const radius = CELL_SIZE/2 - 2.5;
                const gradient = ctx.createRadialGradient(cx-4, cy-4, 2, cx, cy, radius+2);
                if (isHead) {
                    gradient.addColorStop(0, '#8cdb9e');
                    gradient.addColorStop(0.7, '#46b86a');
                    gradient.addColorStop(1, '#1f7a44');
                } else {
                    gradient.addColorStop(0, '#6fc98a');
                    gradient.addColorStop(0.5, '#3b9e5e');
                    gradient.addColorStop(1, '#1b6a3a');
                }
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fill();

                if (isHead) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#f0faf5';
                    ctx.beginPath();
                    let eyeX1, eyeY1, eyeX2, eyeY2;
                    switch (direction) {
                        case 'right': eyeX1 = cx+5; eyeY1 = cy-6; eyeX2 = cx+5; eyeY2 = cy+6; break;
                        case 'left':  eyeX1 = cx-5; eyeY1 = cy-6; eyeX2 = cx-5; eyeY2 = cy+6; break;
                        case 'up':    eyeX1 = cx-6; eyeY1 = cy-5; eyeX2 = cx+6; eyeY2 = cy-5; break;
                        case 'down':  eyeX1 = cx-6; eyeY1 = cy+5; eyeX2 = cx+6; eyeY2 = cy+5; break;
                        default: eyeX1 = cx+5; eyeY1 = cy-6; eyeX2 = cx+5; eyeY2 = cy+6;
                    }
                    ctx.arc(eyeX1, eyeY1, 3.5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.arc(eyeX2, eyeY2, 3.5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#0f2a1c';
                    ctx.beginPath();
                    ctx.arc(eyeX1+1.5, eyeY1-1, 1.8, 0, Math.PI*2);
                    ctx.fill();
                    ctx.arc(eyeX2+1.5, eyeY2-1, 1.8, 0, Math.PI*2);
                    ctx.fill();
                }
            });
            ctx.shadowBlur = 0;

            // 覆盖层（暂停/结束）
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, 500, 500);
                ctx.fillStyle = '#f5e6d3';
                ctx.font = 'bold 32px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(winFlag ? '✨ 胜利 ✨' : '☠️ 游戏结束', 250, 240);
            } else if (paused && gameStarted) {
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.fillRect(0, 0, 500, 500);
                ctx.fillStyle = '#d4d9b0';
                ctx.font = 'bold 36px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⏸ 暂停', 250, 240);
            }
        }

        // ---------- 辅助 ----------
        function updateScore() {
            scoreSpan.textContent = score;
        }

        function updateStatusLed() {
            statusLed.className = 'led';
            if (gameOver) {
                statusLed.classList.add('gameover');
            } else if (paused && gameStarted) {
                statusLed.classList.add('paused');
            } else if (!gameStarted) {
                statusLed.classList.add('idle');
            }
        }

        // ---------- 定时器 ----------
        function startGameLoop() {
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(() => {
                if (!paused && !gameOver && gameStarted) {
                    moveSnake();
                    draw();
                    updateStatusLed();
                    if (gameOver) {
                        updateStatusLed();
                        statusText.innerText = winFlag ? '🎉 胜利' : '💀 游戏结束';
                    }
                }
                draw();
            }, MOVE_INTERVAL_MS);
        }

        function clearGameInterval() {
            if (gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
        }

        // ---------- 开始游戏（点击按钮） ----------
        function startGame() {
            if (gameStarted) return;
            // 如果已经结束或胜利，重置数据
            if (gameOver) {
                resetGameData();
            }
            // 确保蛇、食物等已就绪
            if (snake.length === 0) {
                resetGameData();
            }
            gameStarted = true;
            startOverlay.classList.add('hidden');
            statusText.innerText = '运行中';
            updateStatusLed();
            // 如果定时器没启动则启动
            if (!gameInterval) {
                startGameLoop();
            }
            draw();
        }

        // ---------- 键盘控制 ----------
        function handleKeydown(e) {
            const key = e.key;
            // 阻止方向键滚动 & 空格
            if (key.startsWith('Arrow') || key === ' ' || key === 'Spacebar' || key === 'Space' 
            || key === 'w' || key === 'W' || key === 'a' || key === 'A' || key === 's' || key === 'S' || key === 'd' 
            || key === 'D') {
    e.preventDefault();
            }

            // 空格：暂停（仅当游戏已开始且未结束）
            if ((key === ' ' || key === 'Spacebar' || key === 'Space') && gameStarted && !gameOver) {
                paused = !paused;
                updateStatusLed();
                statusText.innerText = paused ? '⏸ 暂停' : '运行中';
                draw();
                return;
            }

            // 方向控制（仅当游戏已开始且未暂停且未结束）
            if (!gameStarted || gameOver || paused) return;

            let newDir = null;
            if (key === 'w' || key === 'W') newDir = 'up';
            else if (key === 's' || key === 'S') newDir = 'down';
            else if (key === 'a' || key === 'A') newDir = 'left';
            else if (key === 'd' || key === 'D') newDir = 'right';
            else return;

            const opposite = { 'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left' };
            if (direction !== opposite[newDir]) {
                nextDirection = newDir;
                directionChangedThisTick = true;
            }
        }

        // ---------- 重新开始 ----------
        function restartGame() {
            clearGameInterval();
            resetGameData();          // 重置所有数据，显示开始按钮
            // 如果当前是结束状态，重置后回到等待开始
            gameStarted = false;
            startOverlay.classList.remove('hidden');
            statusText.innerText = '等待开始';
            updateStatusLed();
            draw();
        }

        // ---------- 事件绑定 ----------
        window.addEventListener('keydown', handleKeydown);
        startBtn.addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', restartGame);

        // ---------- 初始化 ----------
        resetGameData();   // 初始显示“开始游戏”按钮，蛇静止
        draw();

        // 暴露以便调试（可选）
        window.__snake = { reset: resetGameData, start: startGame };
    })();
</script>
</body>
</html>
